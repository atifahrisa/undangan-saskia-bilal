<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Panel Mempelai — Undangan Saskia & Bilal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#6E0F1F; --maroon-deep:#4A0A15; --gold:#D4AF37; --gold-light:#F1D98B;
    --cream:#FFF8E9; --ink:#2B1810; --green-accent:#2E5339;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Poppins', sans-serif; color:var(--ink);
    background:linear-gradient(180deg, var(--maroon) 0%, var(--maroon-deep) 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .panel{
    max-width:420px; width:100%; background:var(--cream); border-radius:18px;
    padding:32px 26px; box-shadow:0 20px 60px rgba(0,0,0,0.4); border:1px solid var(--gold);
  }
  .eyebrow{ text-align:center; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); font-weight:600; }
  h1{ text-align:center; font-family:'Playfair Display', serif; font-size:24px; color:var(--maroon-deep); margin:8px 0 4px; }
  .sub{ text-align:center; font-size:12.5px; color:#8a7052; margin-bottom:24px; }

  .form-group{ margin-bottom:16px; }
  .form-group label{ display:block; font-size:12px; letter-spacing:1px; color:var(--maroon); margin-bottom:6px; font-weight:500; }
  .form-group input{
    width:100%; padding:12px 14px; border:1px solid #ddc9a3; border-radius:8px;
    font-family:'Poppins', sans-serif; font-size:14px; background:#fff; color:var(--ink);
  }
  button{
    width:100%; padding:14px; background:var(--gold); color:var(--maroon-deep);
    border:none; border-radius:8px; font-weight:600; font-size:14px; letter-spacing:1px; cursor:pointer;
  }
  button:hover{ filter:brightness(1.05); }

  .result-box{
    display:none; margin-top:22px; background:#fff; border:1px solid var(--gold); border-radius:10px;
    padding:18px; text-align:center;
  }
  .result-box .result-title{
    font-family:'Playfair Display', serif; font-size:16px; color:var(--maroon); margin-bottom:10px;
  }
  .result-box .result-link{
    display:block; word-break:break-all; font-size:12.5px; color:#444; background:#faf3e2;
    padding:10px 12px; border-radius:8px; margin-bottom:12px;
  }
  .result-box .copy-btn{ background:var(--maroon); color:var(--gold-light); }

  .history{ margin-top:26px; }
  .history h3{ font-family:'Playfair Display', serif; font-size:15px; color:var(--maroon); margin-bottom:10px; }
  .history-item{
    display:flex; justify-content:space-between; align-items:center; gap:8px;
    background:#fff; border-left:3px solid var(--gold); padding:8px 10px; border-radius:6px;
    margin-bottom:6px; font-size:12px;
  }
  .history-item span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .history-item button{ width:auto; padding:5px 10px; font-size:10.5px; flex-shrink:0; }
  .empty-note{ text-align:center; font-size:12px; color:#a08a63; font-style:italic; }
</style>
</head>
<body>

  <div class="panel">
    <div class="eyebrow">Halaman Privat</div>
    <h1>Panel Mempelai</h1>
    <p class="sub">Saskia & Bilal — Generator Link Undangan Tamu</p>

    <div class="form-group">
      <label>Masukkan Nama Tamu</label>
      <input type="text" id="guest-input" placeholder="Contoh: Bapak Ahmad Sekeluarga">
    </div>
    <button onclick="generateLink()">✧ Buat Link ✧</button>

    <div class="result-box" id="result-box">
      <div class="result-title">Link berhasil dibuat</div>
      <span class="result-link" id="result-link"></span>
      <button class="copy-btn" onclick="copyResult()">Salin Link</button>
    </div>

    <div class="history">
      <h3>🕓 Riwayat Link Dibuat</h3>
      <div id="history-list"><p class="empty-note">Belum ada link dibuat di perangkat ini.</p></div>
    </div>
  </div>

<script>
  // Base URL menunjuk ke index.html di folder yang sama dengan admin.html ini
  function getBaseUrl(){
    const path = window.location.pathname.replace(/admin\.html$/, 'index.html');
    return window.location.origin + path;
  }

  function generateLink(){
    const name = document.getElementById('guest-input').value.trim();
    if(!name){ alert('Tulis dulu nama tamunya ya.'); return; }
    const url = `${getBaseUrl()}?to=${encodeURIComponent(name)}`;
    document.getElementById('result-link').textContent = url;
    document.getElementById('result-box').style.display = 'block';
    saveHistory(name, url);
    document.getElementById('guest-input').value = '';
  }

  function copyResult(){
    const text = document.getElementById('result-link').textContent;
    navigator.clipboard.writeText(text).then(()=>alert('Link tersalin! Siap dibagikan ke tamu lewat WhatsApp.'));
  }

  // Riwayat link disimpan lokal di perangkat mempelai saja (tidak dibagi ke publik)
  function saveHistory(name, url){
    let list = [];
    try{ list = JSON.parse(localStorage.getItem('admin_link_history') || '[]'); }catch(e){}
    list.unshift({ name, url, time: Date.now() });
    list = list.slice(0, 50);
    try{ localStorage.setItem('admin_link_history', JSON.stringify(list)); }catch(e){}
    renderHistory();
  }

  function renderHistory(){
    let list = [];
    try{ list = JSON.parse(localStorage.getItem('admin_link_history') || '[]'); }catch(e){}
    const el = document.getElementById('history-list');
    if(list.length === 0){
      el.innerHTML = '<p class="empty-note">Belum ada link dibuat di perangkat ini.</p>';
      return;
    }
    el.innerHTML = list.map(it => `
      <div class="history-item">
        <span>${escapeHtml(it.name)}</span>
        <button onclick="navigator.clipboard.writeText('${it.url.replace(/'/g, "\\'")}').then(()=>alert('Tersalin!'))">Salin</button>
      </div>
    `).join('');
  }
  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  renderHistory();
</script>
</body>
</html>
